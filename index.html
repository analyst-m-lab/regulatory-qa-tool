<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTC Regulatory AI Assistant</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e3a5f;
    --accent: #00c8ff;
    --accent2: #0066ff;
    --accent3: #00ff99;
    --warn: #ffaa00;
    --danger: #ff4466;
    --text: #e8f0ff;
    --text-muted: #6b82a0;
    --text-dim: #3d5070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }
  .header-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    background: linear-gradient(135deg, #00c8ff, #0066ff, #00ff99);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeIn 0.4s ease both 0.2s;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .progress-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
  }
  .progress-bar {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(0,200,255,0.5);
  }

  /* Step indicator */
  .step-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    animation: fadeIn 0.4s ease both 0.3s;
  }
  .step-dot {
    width: 28px;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    transition: all 0.3s ease;
  }
  .step-dot.done { background: var(--accent3); }
  .step-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,200,255,0.6);
    width: 40px;
  }

  /* Chat area */
  .chat-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .msg-ai { align-items: flex-start; }
  .msg-user { align-items: flex-start; flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
  }
  .msg-user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 14px;
  }

  .msg-bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
  }
  .msg-ai .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg-user .msg-bubble {
    background: linear-gradient(135deg, rgba(0,102,255,0.2), rgba(0,200,255,0.15));
    border: 1px solid rgba(0,200,255,0.3);
    border-top-right-radius: 4px;
    color: var(--text);
    text-align: right;
  }

  .msg-bubble strong {
    color: var(--accent);
    font-weight: 500;
  }
  .msg-bubble .highlight {
    background: rgba(0,200,255,0.1);
    border-left: 2px solid var(--accent);
    padding: 8px 12px;
    margin: 8px 0;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
  }
  .msg-bubble .warn-box {
    background: rgba(255,170,0,0.1);
    border-left: 2px solid var(--warn);
    padding: 8px 12px;
    margin: 8px 0;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: #ffd580;
  }

  /* Options */
  .options-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .opt-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--accent);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    line-height: 1.4;
    text-align: left;
    max-width: 100%;
    word-break: break-word;
  }
  .opt-btn:hover {
    background: rgba(0,200,255,0.1);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,200,255,0.2);
    transform: translateY(-1px);
  }
  .opt-btn.selected {
    background: rgba(0,200,255,0.2);
    border-color: var(--accent);
    color: white;
  }

  /* Input area */
  .input-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px 4px 4px 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within {
    border-color: rgba(0,200,255,0.5);
    box-shadow: 0 0 20px rgba(0,200,255,0.08);
  }
  .input-wrap textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 300;
    resize: none;
    line-height: 1.6;
    padding: 10px 0;
    min-height: 44px;
    max-height: 120px;
  }
  .input-wrap textarea::placeholder { color: var(--text-dim); }
  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    margin-bottom: 2px;
  }
  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 16px rgba(0,200,255,0.4);
  }
  .send-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }
  .send-btn svg { color: white; }

  /* Result panel */
  .result-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 8px;
    animation: msgIn 0.4s ease both;
  }
  .result-header {
    background: linear-gradient(135deg, rgba(0,102,255,0.2), rgba(0,200,255,0.1));
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-header-icon {
    width: 24px;
    height: 24px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .result-header h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .result-body {
    padding: 20px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }
  .result-section {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--surface2);
  }
  .result-section:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .result-section h4 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent3);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-section h4::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--surface2);
  }
  .result-item {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .result-item::before {
    content: '▸';
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    margin: 2px;
  }
  .tag-blue { background: rgba(0,102,255,0.2); color: #66aaff; border: 1px solid rgba(0,102,255,0.3); }
  .tag-green { background: rgba(0,255,153,0.1); color: #00ff99; border: 1px solid rgba(0,255,153,0.3); }
  .tag-warn { background: rgba(255,170,0,0.1); color: #ffaa00; border: 1px solid rgba(255,170,0,0.3); }
  .tag-red { background: rgba(255,68,102,0.1); color: #ff6688; border: 1px solid rgba(255,68,102,0.3); }

  /* Reset button */
  .reset-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
  }
  .reset-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(255,68,102,0.05);
  }

  /* Loading */
  .loading-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 2px;
    animation: bounce 1.2s infinite ease-in-out both;
  }
  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .typing-cursor::after {
    content: '|';
    animation: blink 0.8s infinite;
    color: var(--accent);
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .copy-btn {
    float: right;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 8px;
  }
  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Country selector */
  .country-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    margin-top: 10px;
  }
  .country-card {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    text-align: left;
    line-height: 1.4;
  }
  .country-card:hover {
    border-color: var(--accent);
    background: rgba(0,200,255,0.07);
    transform: translateY(-1px);
  }
  .country-card.selected {
    border-color: var(--accent);
    background: rgba(0,200,255,0.15);
    box-shadow: 0 0 12px rgba(0,200,255,0.2);
    color: white;
  }
  .country-card .flag { font-size: 18px; flex-shrink: 0; }
  .country-card .cname { font-size: 12px; font-weight: 500; }
  .country-card .reg { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .country-card.selected .reg { color: rgba(0,200,255,0.7); }
  .country-confirm-btn {
    margin-top: 12px;
    padding: 9px 20px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    color: white;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .country-confirm-btn:hover {
    box-shadow: 0 4px 16px rgba(0,200,255,0.4);
    transform: translateY(-1px);
  }
  .country-confirm-btn.visible { display: inline-flex; align-items: center; gap: 6px; }

  /* ── Language selector ── */
  .lang-selector {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease both;
  }
  .lang-btn {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-btn.active {
    background: rgba(0,200,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }
  .tab-bar {
    display: none;
    gap: 4px;
    margin-bottom: 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab-bar.visible { display: flex; }
  .tab-btn {
    padding: 10px 18px;
    border-radius: 8px 8px 0 0;
    border: 1px solid transparent;
    border-bottom: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    bottom: -1px;
  }
  .tab-btn:hover { color: var(--accent); background: rgba(0,200,255,0.05); }
  .tab-btn.active {
    color: var(--accent);
    background: var(--surface);
    border-color: var(--border);
    border-bottom-color: var(--surface);
  }

  /* ── Checklist ── */
  .checklist-wrap { padding: 4px 0; }
  .cl-phase {
    margin-bottom: 20px;
  }
  .cl-phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    cursor: pointer;
    user-select: none;
  }
  .cl-phase-header:hover { background: rgba(0,200,255,0.07); }
  .cl-phase-title { font-size: 13px; font-weight: 500; flex: 1; }
  .cl-phase-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .cl-phase-count .done-count { color: var(--accent3); }
  .cl-items { padding-left: 4px; }
  .cl-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 3px;
    transition: background 0.15s;
    cursor: pointer;
  }
  .cl-item:hover { background: rgba(255,255,255,0.03); }
  .cl-item.checked { opacity: 0.5; }
  .cl-item.checked .cl-text { text-decoration: line-through; color: var(--text-muted); }
  .cl-checkbox {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }
  .cl-item.checked .cl-checkbox {
    background: var(--accent3);
    border-color: var(--accent3);
  }
  .cl-item.checked .cl-checkbox::after {
    content: '✓';
    font-size: 10px;
    color: #000;
    font-weight: 700;
  }
  .cl-text { font-size: 13px; line-height: 1.6; flex: 1; }
  .cl-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .cl-tag-must { background: rgba(255,68,102,0.15); color: #ff6688; border: 1px solid rgba(255,68,102,0.3); }
  .cl-tag-rec  { background: rgba(255,170,0,0.12); color: #ffaa00; border: 1px solid rgba(255,170,0,0.3); }
  .cl-tag-cond { background: rgba(0,102,255,0.15); color: #66aaff; border: 1px solid rgba(0,102,255,0.3); }
  .cl-progress-bar {
    height: 2px;
    background: var(--surface2);
    border-radius: 1px;
    margin: 6px 14px 0;
    overflow: hidden;
  }
  .cl-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent3));
    border-radius: 1px;
    transition: width 0.3s ease;
  }
  .cl-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .cl-summary-pct {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }
  .cl-reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .cl-reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Checklist filter bar ── */
  .cl-filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
    align-items: center;
  }
  .cl-filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-right: 2px;
  }
  .cl-filter-btn {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cl-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cl-filter-btn.active {
    background: rgba(0,200,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Checklist item detail row ── */
  .cl-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 5px;
  }
  .cl-meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .cl-chip-owner {

function buildDrugTypeOptions() {
  var codes = selectedCountries.map(function(c) { return c.code; });

  var opts = [];
  codes.forEach(function(code) {

  });

}

// ── UI helpers ────────────────────────────────────────────
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function showBackBtn(stepIdx) {
  var btn = el('backBtn');
  if (!btn) return;
  // Show during question flow (not during report display)
  btn.style.display = (stepIdx > 0 && stepIdx < TOTAL_STEPS) ? 'inline-flex' : 'none';
}
function hideBackBtn() {
  var btn = el('backBtn');
  if (btn) btn.style.display = 'none';
}

async function goBack() {
  if (isLoading || stepHistory.length === 0) return;
  var prev = stepHistory.pop();
  // Remove the steps answer for current step
  var steps = getSteps();
  // currentStep is the step we just answered (or are on)
  // We want to go back to prev.step - 1
  var targetStep = prev.step - 1;
  if (targetStep < 0) targetStep = 0;

  // Restore state
  var stateSnap = prev;
  currentStep = targetStep;
  
  // Remove messages added after snapshot
  var area = el('chatArea');
  if (area) {
    while (area.children.length > stateSnap.msgCount) {
      area.removeChild(area.lastChild);
    }
  }
  
  // Delete answers for steps >= targetStep
  for (var i = targetStep; i < steps.length; i++) {
    delete answers[steps[i].key];
  }
  // Also reset selectedCountries if going back to step 0
  if (targetStep === 0) {
    selectedCountries = [];
  }
  
  updateProgress();
  isLoading = true;
  addLoading(); await sleep(300); removeLoading();
  isLoading = false;
  await askStep(targetStep);
}

function el(id) { return document.getElementById(id); }

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function updateProgress() {
  var pct = Math.round(currentStep / TOTAL_STEPS * 100);
  el('progressFill').style.width = pct + '%';
  el('progressPct').textContent = pct + '%';
  el('progressLabel').textContent = 'STEP ' + currentStep + ' / ' + TOTAL_STEPS;
  var nav = el('stepNav');
  nav.innerHTML = '';
  for (var i = 0; i < TOTAL_STEPS; i++) {
    var dot = document.createElement('div');
    dot.className = 'step-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    nav.appendChild(dot);
  }
}

function addMsg(role, html, options) {
  var area = el('chatArea');
  var msg = document.createElement('div');
  msg.className = 'msg msg-' + role;
  var av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'ai' ? 'AI' : '👤';
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html;
  if (options && role === 'ai') {
    var grid = document.createElement('div');
    grid.className = 'options-grid';
    options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = function() {
        document.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        el('userInput').value = opt;
        autoResize(el('userInput'));
      };
      grid.appendChild(btn);
    });
    bubble.appendChild(grid);
  }
  msg.appendChild(av);
  msg.appendChild(bubble);
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
}

function addLoading() {
  var area = el('chatArea');
  var msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  msg.id = 'loadingMsg';
  msg.innerHTML = '<div class="msg-avatar">AI</div><div class="msg-bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
}
function removeLoading() { var m = el('loadingMsg'); if (m) m.remove(); }

function setLang(lang) {

  ['JA','EN','FR'].forEach(function(l) {
    el('lang' + l).classList.toggle('active', l.toLowerCase() === lang);
  });
  el('headerTitle').textContent = T('headerTitle');
  el('headerSubtitle').textContent = T('headerSubtitle');
  el('tabReportLabel').textContent = T('tabReport');
  el('tabChecklistLabel').textContent = T('tabChecklist');
  el('resetLabel').textContent = T('resetLabel');
  el('userInput').placeholder = T('inputPlaceholder');

}

// ── Step rendering ────────────────────────────────────────
async function askStep(idx) {
  // Push current state to history before rendering (so user can go back)
  if (idx > 0) {
    var msgCount = el('chatArea') ? el('chatArea').children.length : 0;
    stepHistory.push({step: idx, msgCount: msgCount});
    showBackBtn(idx);
  } else {
    hideBackBtn();
  }
  var step = getSteps()[idx];
  var sep = LANG === 'ja' ? '：' : ': ';
  var header = '<strong>Q' + (idx+1) + '/' + TOTAL_STEPS + sep + step.question + '</strong><br>'
    + '<span style="color:var(--text-muted);font-size:13px;">' + step.detail + '</span>';

  if (step.type === 'country') {
    renderCountryStep(header);
  } else if (step.type === 'drugType') {
    renderDrugTypeStep(idx, step);
  } else if (step.type === 'multiselect') {
    await renderMultiselectStep(idx, step, header);
  } else {
    addMsg('ai', header, step.options || null);
    el('inputWrap').style.display = 'flex';
    el('userInput').placeholder = step.placeholder || T('inputPlaceholderSelect');
  }
}

function renderCountryStep(header) {
  var area = el('chatArea');
  var msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  var av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = 'AI';
  var bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  bubble.innerHTML = header;

  var grid = document.createElement('div'); grid.className = 'country-grid';
  var confirmBtn = document.createElement('button');
  confirmBtn.className = 'country-confirm-btn';
  confirmBtn.textContent = T('confirmBtn');
  confirmBtn.onclick = function() { confirmCountries(confirmBtn); };

  var otherWrap = document.createElement('div');
  otherWrap.id = 'otherCountryWrap';
  otherWrap.style.cssText = 'display:none;margin-top:10px;';
  otherWrap.innerHTML = '<input id="otherCountryInput" type="text" placeholder="' + T('otherCountryPlaceholder') + '" style="width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;outline:none;" oninput="updateOtherCountry()">'
    + '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">' + T('otherCountryNote') + '</div>';

  COUNTRIES.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'country-card';
    card.dataset.code = c.code;
    card.innerHTML = '<span class="flag">' + c.flag + '</span><div><div class="cname">' + c.name + '</div><div class="reg">' + c.reg + '</div></div>';
    card.onclick = function() { toggleCountry(c, card, confirmBtn, otherWrap); };
    grid.appendChild(card);
  });

  bubble.appendChild(grid);
  bubble.appendChild(otherWrap);
  bubble.appendChild(confirmBtn);
  msg.appendChild(av); msg.appendChild(bubble);
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
  el('inputWrap').style.display = 'none';
}

function toggleCountry(c, card, confirmBtn, otherWrap) {
  var idx = selectedCountries.findIndex(function(x) { return x.code === c.code; });
  if (idx >= 0) {
    selectedCountries.splice(idx, 1);
    card.classList.remove('selected');
    if (c.code === 'OTHER') otherWrap.style.display = 'none';
  } else {
    selectedCountries.push(Object.assign({}, c));
    card.classList.add('selected');
    if (c.code === 'OTHER') {
      otherWrap.style.display = 'block';
      setTimeout(function() { var inp = el('otherCountryInput'); if (inp) inp.focus(); }, 50);
    }
  }
  if (selectedCountries.length > 0) {
    confirmBtn.classList.add('visible');

async function apiCall(system, prompt, retries) {
  retries = retries || 0;
  var res;
  try {
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 6000,
        system: system,
        messages: [{role:'user', content:prompt}]
      })
    });
  } catch(fetchErr) {
    if (retries < 2) {
      await sleep(2000);
      return apiCall(system, prompt, retries + 1);
    }
    throw new Error('ネットワークエラー: ' + fetchErr.message);
  }
  // Retry on 502/503/529
  if ((res.status === 502 || res.status === 503 || res.status === 529) && retries < 2) {
    await sleep(3000 * (retries + 1));
    return apiCall(system, prompt, retries + 1);
  }
  if (!res.ok) {
    var errBody = '';
    try { errBody = await res.text(); } catch(e) {}
    throw new Error('HTTP ' + res.status + ' ' + res.statusText + (errBody ? ': ' + errBody.substring(0,200) : ''));
  }
  var data;
  try { data = await res.json(); } catch(e) {
    throw new Error('レスポンスのJSON解析失敗: ' + e.message);
  }
  if (data.error) {
    throw new Error('API error [' + data.error.type + ']: ' + data.error.message);
  }
  if (!data.content || !Array.isArray(data.content) || data.content.length === 0) {
    throw new Error('空のレスポンス (stop_reason=' + data.stop_reason + ')');
  }
  return data.content.map(function(i) { return i.type === 'text' ? i.text : ''; }).join('');
}

function cleanJson(s) {
  if (!s) return '{}';
  // Remove all markdown code fences
  s = s.replace(/```json/gi, '').replace(/```/g, '').trim();
  // Remove common preamble patterns
  s = s.replace(/^[^{[]*/, '').trim();
  // Find outermost { ... }
  var start = s.indexOf('{');
  var end = s.lastIndexOf('}');
  if (start >= 0 && end > start) {
    s = s.substring(start, end + 1);
  }
  return s;
}

    var sp = r.specifications;
    var h3 = '<div class="result-section"><h4>🧪 ' + (LANG==='ja'?'製品規格（案）':LANG==='fr'?'Spécifications (projet)':'Specifications (Draft)') + '</h4>';
    function specTable(title, rows) {
      if (!rows||!rows.length) return '';
      var t = '<div style="margin-bottom:12px;"><strong style="font-size:13px;color:var(--accent);">■ ' + title + '</strong>'
        + '<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:12px;">'
        + '<tr style="border-bottom:1px solid var(--border);color:var(--text-muted);"><th style="text-align:left;padding:6px 8px;">' + (LANG==='ja'?'試験項目':'Test') + '</th><th style="text-align:left;padding:6px 8px;">' + (LANG==='ja'?'試験方法':'Method') + '</th><th style="text-align:left;padding:6px 8px;">' + (LANG==='ja'?'基準値案':'Criterion') + '</th></tr>';
      rows.forEach(function(s) { t += '<tr style="border-bottom:1px solid var(--surface2);"><td style="padding:6px 8px;">' + s.name + '</td><td style="padding:6px 8px;color:var(--text-muted);">' + s.method + '</td><td style="padding:6px 8px;color:var(--accent3);">' + s.criterion + '</td></tr>'; });
      return t + '</table></div>';
    }
    h3 += specTable(LANG==='ja'?'原薬規格':LANG==='fr'?'Spécifications PA':'API Specifications', sp.api_specs);
    h3 += specTable(LANG==='ja'?'製剤規格':LANG==='fr'?'Spécifications produit fini':'Finished Product Specifications', sp.product_specs);
    if (sp.stability) {
      h3 += '<div><strong style="font-size:13px;color:var(--accent);">■ ' + (LANG==='ja'?'安定性試験':LANG==='fr'?'Études de stabilité':'Stability Studies') + '</strong><div style="margin-top:8px;">'
        + (sp.stability.conditions||[]).map(function(c) { return '<span class="tag tag-blue">' + c + '</span>'; }).join('')
        + '<div class="result-item" style="margin-top:8px;"><span>' + sp.stability.duration + '</span></div>'
        + (sp.stability.notes ? '<div class="result-item"><span>' + sp.stability.notes + '</span></div>' : '')
        + '</div></div>';
    }
    h3 += '</div>';
    body.innerHTML += h3;
  }

  // 4. CPP
  if (r.cpp && r.cpp.length) {
    var h4 = '<div class="result-section"><h4>⚙️ Critical Process Parameters (CPP)</h4>'
      + '<table style="width:100%;border-collapse:collapse;font-size:12px;">'
      + '<tr style="border-bottom:1px solid var(--border);color:var(--text-muted);"><th style="text-align:left;padding:6px 8px;">CPP</th><th style="text-align:left;padding:6px 8px;">' + (LANG==='ja'?'目標値':'Target') + '</th><th style="text-align:left;padding:6px 8px;">' + (LANG==='ja'?'根拠':'Justification') + '</th><th style="text-align:center;padding:6px 8px;">' + (LANG==='ja'?'リスク':'Risk') + '</th></tr>';
    r.cpp.forEach(function(c) {
      var isHigh = c.risk_level==='高'||c.risk_level==='high'||c.risk_level==='élevé';
      var isMed = c.risk_level==='中'||c.risk_level==='medium'||c.risk_level==='moyen';
      var rc = isHigh ? 'tag-red' : isMed ? 'tag-warn' : 'tag-green';
      h4 += '<tr style="border-bottom:1px solid var(--surface2);"><td style="padding:6px 8px;font-weight:500;">' + c.parameter + '</td><td style="padding:6px 8px;color:var(--accent3);">' + c.target + '</td><td style="padding:6px 8px;color:var(--text-muted);">' + c.justification + '</td><td style="padding:6px 8px;text-align:center;"><span class="tag ' + rc + '">' + c.risk_level + '</span></td></tr>';
    });
    h4 += '</table></div>';
    body.innerHTML += h4;
  }

  // 5. Novel ingredient
  if (r.novel_ingredient_requirements) {
    var ni = r.novel_ingredient_requirements;
    var h5 = '<div class="result-section"><h4>⚠ ' + (LANG==='ja'?'新規原料 追加要件':LANG==='fr'?'Exigences substances nouvelles':'Novel Ingredient Requirements') + '</h4>'
      + '<div class="warn-box">' + (LANG==='ja'?'新規原料が含まれるため、追加資料が必要です。':LANG==='fr'?'Des substances nouvelles nécessitent des documents supplémentaires.':'Novel ingredients require additional documentation.') + '</div>';
    if (typeof ni === 'object') {
      Object.entries(ni).forEach(function(e) { h5 += '<div class="result-item"><span><strong>' + e[0] + '：</strong>' + (Array.isArray(e[1]) ? e[1].join('、') : e[1]) + '</span></div>'; });
    } else { h5 += '<div class="result-item"><span>' + ni + '</span></div>'; }
    h5 += '</div>';
    body.innerHTML += h5;
  }

  // 6. Compendial requirements
  if (r.compendial_requirements) {
    var cr = r.compendial_requirements;
    var h6 = '<div class="result-section"><h4>📖 ' + (LANG==='ja'?'公定書外原料 規格設定要件':LANG==='fr'?'Exigences non-pharmacopéiques':'Non-Compendial Requirements') + '</h4>'
      + '<div class="warn-box">' + (LANG==='ja'?'公定書外原料が含まれるため、独自規格の設定が必要です。':LANG==='fr'?'Des substances non-pharmacopéiques nécessitent des spécifications internes.':'Non-compendial ingredients require in-house specifications.') + '</div>';
    if (cr['対象規格書']) h6 += '<div style="margin-bottom:10px;">' + cr['対象規格書'].map(function(s) { return '<span class="tag tag-blue">' + s + '</span>'; }).join('') + '</div>';
    if (cr['色素_香料_特記']) h6 += '<div style="margin-bottom:12px;padding:10px 14px;background:rgba(0,255,153,0.07);border:1px solid rgba(0,255,153,0.25);border-radius:8px;"><div style="font-size:11px;font-family:Space Mono,monospace;color:var(--accent3);margin-bottom:6px;">🎨 ' + (LANG==='ja'?'色素・香料 食品基準適合の特例':'Colorant/Flavor — Food Standard Exemption') + '</div><div style="font-size:13px;line-height:1.7;">' + cr['色素_香料_特記'] + '</div></div>';
    if (cr['規格設定']) cr['規格設定'].forEach(function(i) { h6 += '<div class="result-item"><span>' + i + '</span></div>'; });
    if (cr['注意事項']) h6 += '<div class="highlight">' + cr['注意事項'] + '</div>';
    Object.entries(cr).forEach(function(e) {
      if (['対象規格書','規格設定','注意事項','色素_香料_特記'].indexOf(e[0]) < 0) {
        h6 += '<div class="result-item"><span><strong>' + e[0] + '：</strong>' + (Array.isArray(e[1]) ? e[1].join('、') : e[1]) + '</span></div>';
      }
    });
    h6 += '</div>';
    body.innerHTML += h6;
  }

  // 7. Regulatory differences
  if (r.regulatory_differences && r.regulatory_differences.length) {
    var h7 = '<div class="result-section"><h4>🌐 ' + (LANG==='ja'?'国間の主要規制差異':LANG==='fr'?'Différences réglementaires':'Key Regulatory Differences') + '</h4>';
    r.regulatory_differences.forEach(function(d) {
      h7 += '<div style="margin-bottom:10px;padding:10px 12px;background:rgba(255,170,0,0.05);border-radius:8px;border:1px solid rgba(255,170,0,0.2);"><div style="font-size:13px;font-weight:500;color:var(--warn);margin-bottom:4px;">📌 ' + d.topic + '</div><div style="font-size:13px;line-height:1.7;">' + d.details + '</div></div>';
    });
    h7 += '</div>';
    body.innerHTML += h7;
  }

  // 8. Timeline
  if (r.timeline && r.timeline.length) {
    var h8 = '<div class="result-section"><h4>📅 ' + (LANG==='ja'?'開発タイムライン':LANG==='fr'?'Calendrier de développement':'Development Timeline') + '</h4>';
    r.timeline.forEach(function(t, i) {
      h8 += '<div style="display:flex;gap:12px;margin-bottom:12px;"><div style="display:flex;flex-direction:column;align-items:center;min-width:20px;"><div style="width:12px;height:12px;border-radius:50%;background:var(--accent);margin-top:3px;flex-shrink:0;box-shadow:0 0 8px rgba(0,200,255,0.4)"></div>'
        + (i < r.timeline.length-1 ? '<div style="flex:1;width:2px;background:var(--border);margin:2px 0 0"></div>' : '')
        + '</div><div style="padding-bottom:8px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><strong>' + t.phase + '</strong><span class="tag tag-blue">' + t.duration + '</span></div>'
        + (t.key_tasks||[]).map(function(tk) { return '<div style="font-size:12px;color:var(--text-muted);margin-bottom:2px;">• ' + tk + '</div>'; }).join('')
        + '</div></div>';
    });
    h8 += '</div>';
    body.innerHTML += h8;
  }

  // 9. Medical Strategy
  if (r.medical_strategy) {
    var ms = r.medical_strategy;
    var h9 = '<div class="result-section"><h4>💊 ' + (LANG==='ja'?'メディカル・クリニカル戦略':LANG==='fr'?'Stratégie médicale / clinique':'Medical & Clinical Strategy') + '</h4>';
    if (ms.beq_strategy) h9 += '<div style="margin-bottom:12px;padding:12px;background:rgba(0,255,153,0.06);border:1px solid rgba(0,255,153,0.2);border-radius:8px;"><div style="font-size:11px;font-family:Space Mono,monospace;color:var(--accent3);margin-bottom:6px;">⚗ BEQ / ' + (LANG==='ja'?'生物学的同等性戦略':'Bioequivalence Strategy') + '</div><div style="font-size:13px;line-height:1.7;">' + ms.beq_strategy + '</div></div>';
    if (ms.biowaiver_possibility) h9 += '<div style="margin-bottom:10px;padding:10px 12px;background:rgba(0,102,255,0.07);border-radius:8px;border:1px solid rgba(0,102,255,0.2);"><div style="font-size:11px;font-family:Space Mono,monospace;color:var(--accent);margin-bottom:4px;">BCS BIOWAIVER</div><div style="font-size:13px;line-height:1.7;">' + ms.biowaiver_possibility + '</div></div>';
    if (ms.clinical_requirements && ms.clinical_requirements.length) {
      h9 += '<div style="margin-bottom:8px;font-size:12px;color:var(--text-muted);">── ' + (LANG==='ja'?'各国臨床要件':'Clinical Requirements by Country') + ' ──</div>';
      ms.clinical_requirements.forEach(function(cr) {
        h9 += '<div style="margin-bottom:8px;padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);"><strong style="color:var(--accent);">' + cr.country + '</strong><div style="font-size:13px;margin-top:4px;">' + cr.requirement + '</div>' + (cr.rationale ? '<div style="font-size:12px;color:var(--text-muted);margin-top:3px;">' + cr.rationale + '</div>' : '') + '</div>';
      });
    }
    if (ms.safety_data_package && ms.safety_data_package.length) {
      h9 += '<div style="margin-top:8px;"><div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">── ' + (LANG==='ja'?'安全性データパッケージ':'Safety Data Package') + ' ──</div>';
      ms.safety_data_package.forEach(function(item) { h9 += '<div class="result-item"><span>' + item + '</span></div>'; });
      h9 += '</div>';
    }
    if (ms.switch_considerations) h9 += '<div class="highlight" style="margin-top:10px;">' + ms.switch_considerations + '</div>';
    h9 += '</div>';
    body.innerHTML += h9;
  }

  // 10. Notes
  if (r.additional_notes) {
    body.innerHTML += '<div class="result-section"><h4>' + (LANG==='ja'?'特記事項':LANG==='fr'?'Notes additionnelles':'Additional Notes') + '</h4><div class="highlight">' + r.additional_notes + '</div></div>';
  }

  panel.appendChild(body);
  area.appendChild(panel);
  area.scrollTop = area.scrollHeight;
  addMsg('ai', T('doneMsg'));
}

function renderRawReport(text) {
  var area = el('chatArea');
  var panel = document.createElement('div'); panel.className = 'result-panel';
  panel.innerHTML = '<div class="result-header"><div class="result-header-icon">📋</div><h3>' + T('reportHeader') + '</h3></div><div class="result-body" style="white-space:pre-wrap;">' + text + '</div>';
  area.appendChild(panel); area.scrollTop = area.scrollHeight;
}

function copyReport() {
  var body = el('reportBody');
  if (body) {
    navigator.clipboard.writeText(body.innerText).then(function() {
      var btn = document.querySelector('.copy-btn');
      btn.textContent = T('copiedBtn');
      setTimeout(function() { btn.textContent = T('copyBtn'); }, 2000);
    });
  }
}

// ── Checklist render ──────────────────────────────────────
function renderChecklist(phases) {
  var area = el('checklistArea');
  if (!phases || !phases.length) {
    area.innerHTML = '<div style="padding:20px;color:var(--text-muted);">' + T('clFailed') + '</div>';
    return;
  }
  _clData = phases;
  _clChecked = {};
  var ownerSet = {};
  var total = 0;
  phases.forEach(function(p) {
    (p.items||[]).forEach(function(item) {
      total++;
      if (item.owner) ownerSet[item.owner] = true;
    });
  });
  var owners = Object.keys(ownerSet);
  var colorMap = {accent:'var(--accent)', warn:'var(--warn)', green:'var(--accent3)', red:'var(--danger)'};

  var html = '<div class="cl-summary">'
    + '<div><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">' + T('clProgress') + '</div>'
    + '<div style="display:flex;align-items:baseline;gap:6px;"><span class="cl-summary-pct" id="clPct">0%</span><span style="font-size:12px;color:var(--text-muted);" id="clCount">0 / ' + total + ' ' + T('clComplete') + '</span></div>'
    + '<div style="width:200px;height:3px;background:var(--surface);border-radius:2px;margin-top:6px;overflow:hidden;"><div id="clTotalBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent3));border-radius:2px;transition:width 0.3s;"></div></div></div>'
    + '<button class="cl-reset-btn" onclick="resetChecklist()">' + T('clReset') + '</button></div>'
    + '<div class="cl-filter-bar"><span class="cl-filter-label">' + T('filterLabel') + '</span>'
    + '<button class="cl-filter-btn active" onclick="setClFilter(\'ALL\',this)">' + T('filterAll') + '</button>'
    + owners.map(function(o) { return '<button class="cl-filter-btn" onclick="setClFilter(\'' + o.replace(/'/g,"\\'") + '\',this)">' + o + '</button>'; }).join('')
    + '<button class="cl-filter-btn" onclick="setClFilter(\'INCOMPLETE\',this)">' + T('filterIncomplete') + '</button></div>'
    + '<div class="checklist-wrap" id="clBody">';

  phases.forEach(function(phase, pi) {
    var bc = colorMap[phase.color] || 'var(--accent)';
    var items = phase.items || [];
    html += '<div class="cl-phase" id="clPhase' + pi + '">'
      + '<div class="cl-phase-header" style="border-left-color:' + bc + '" onclick="togglePhase(' + pi + ')">'
      + '<span style="color:' + bc + ';font-size:15px;">◆</span>'
      + '<span class="cl-phase-title">' + phase.phase + '</span>'
      + '<span class="cl-phase-count"><span class="done-count" id="phDone' + pi + '">0</span> / ' + items.length + '</span>'
      + '<span style="color:var(--text-muted);font-size:12px;" id="phArrow' + pi + '">▾</span></div>'
      + '<div class="cl-progress-bar"><div class="cl-progress-fill" id="phBar' + pi + '" style="width:0%"></div></div>'
      + '<div class="cl-items" id="phItems' + pi + '">';

    items.forEach(function(item, ii) {
      var tc = item.priority==='必須'||item.priority==='mandatory'||item.priority==='obligatoire' ? 'cl-tag-must'
        : item.priority==='推奨'||item.priority==='recommended'||item.priority==='recommandé' ? 'cl-tag-rec' : 'cl-tag-cond';
      var tl = item.priority==='必須'||item.priority==='mandatory'||item.priority==='obligatoire' ? 'MUST'
        : item.priority==='推奨'||item.priority==='recommended'||item.priority==='recommandé' ? 'REC' : 'OPT';
      var oa = item.owner ? ' data-owner="' + item.owner.replace(/"/g,'&quot;') + '"' : '';
      html += '<div class="cl-item" id="clItem' + pi + '-' + ii + '"' + oa + ' onclick="toggleItem(' + pi + ',' + ii + ')">'
        + '<div class="cl-checkbox" id="clBox' + pi + '-' + ii + '"></div>'
        + '<div style="flex:1;min-width:0;">'
        + '<div class="cl-text">' + item.text + '</div>'
        + '<div class="cl-meta">'
        + (item.owner ? '<span class="cl-meta-chip cl-chip-owner">👤 ' + item.owner + '</span>' : '')
        + (item.deadline_hint ? '<span class="cl-meta-chip cl-chip-deadline">🗓 ' + item.deadline_hint + '</span>' : '')
        + (item.deliverable ? '<span class="cl-meta-chip cl-chip-deliverable">📄 ' + item.deliverable + '</span>' : '')
        + '</div>'
        + (item.note ? '<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">💬 ' + item.note + '</div>' : '')
        + '</div>'
        + '<span class="cl-tag ' + tc + '" style="flex-shrink:0;margin-top:2px;">' + tl + '</span>'
        + '</div>';
    });
    html += '</div></div>';
  });

  html += '</div>';
  area.innerHTML = html;
}

function toggleItem(pi, ii) {
  var key = pi + '-' + ii;
  _clChecked[key] = !_clChecked[key];
  var item = el('clItem' + pi + '-' + ii);
  if (item) item.classList.toggle('checked', !!_clChecked[key]);
  updateClProgress();
}

function updateClProgress() {
  var total = 0, done = 0;
  _clData.forEach(function(phase, pi) {
    var items = phase.items || [];
    var pd = 0;
    items.forEach(function(_, ii) {
      total++;
      if (_clChecked[pi + '-' + ii]) { done++; pd++; }
    });
    var pct = items.length ? Math.round(pd / items.length * 100) : 0;
    var bar = el('phBar' + pi); if (bar) bar.style.width = pct + '%';
    var cnt = el('phDone' + pi); if (cnt) cnt.textContent = pd;
  });
  var tp = total ? Math.round(done/total*100) : 0;
  var pe = el('clPct'); if (pe) pe.textContent = tp + '%';
  var ce = el('clCount'); if (ce) ce.textContent = done + ' / ' + total + ' ' + T('clComplete');
  var be = el('clTotalBar'); if (be) be.style.width = tp + '%';
}

function togglePhase(pi) {
  var items = el('phItems' + pi);
  var arrow = el('phArrow' + pi);
  if (!items) return;
  var hidden = items.style.display === 'none';
  items.style.display = hidden ? '' : 'none';
  if (arrow) arrow.textContent = hidden ? '▾' : '▸';
}

function resetChecklist() {
  _clChecked = {};
  document.querySelectorAll('.cl-item').forEach(function(e) { e.classList.remove('checked'); });
  updateClProgress();
}

function setClFilter(filter, btn) {
  document.querySelectorAll('.cl-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.cl-item').forEach(function(item) {
    if (filter === 'ALL') { item.style.display = ''; }
    else if (filter === 'INCOMPLETE') { item.style.display = item.classList.contains('checked') ? 'none' : ''; }
    else { item.style.display = (item.dataset.owner||'') === filter ? '' : 'none'; }
  });
}

function switchTab(tab) {
  var pr = el('panelReport');
  var pc = el('panelChecklist');
  if (pr) { pr.style.display = tab==='report' ? 'block' : 'none'; pr.classList.toggle('active', tab==='report'); }
  if (pc) { pc.style.display = tab==='checklist' ? 'block' : 'none'; pc.classList.toggle('active', tab==='checklist'); }
  var tr = el('tabReport'); var tc = el('tabChecklist');
  if (tr) tr.classList.toggle('active', tab==='report');
  if (tc) tc.classList.toggle('active', tab==='checklist');
}

// ── Reset & init ──────────────────────────────────────────
function resetAll() {
  currentStep = 0; answers = {}; selectedCountries = []; _clData = []; _clChecked = {}; stepHistory = [];
  el('chatArea').innerHTML = '';
  el('checklistArea').innerHTML = '';
  el('inputWrap').style.display = 'flex';
  el('userInput').placeholder = T('inputPlaceholder');
  el('tabBar').classList.remove('visible');
  switchTab('report');
  updateProgress();
  startConversation();
}

function startConversation() {
  setTimeout(function() {
    addMsg('ai', T('introMsg').replace('STEPS_NUM', TOTAL_STEPS));
    setTimeout(function() { askStep(0); }, 800);
  }, 300);
}

// Init
switchTab('report');
updateProgress();
startConversation();






</script>
</body>
</html>
